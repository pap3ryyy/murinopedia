<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="icon" type="image/png" href="asset/logo.ico">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Новол Знань — Муринопедия</title>
    <link rel="stylesheet" href="css/wiki.css">
</head>
<body>

<header>
    <div class="logo-area">
        <img src="asset/logo.png" alt="М.С.В." class="logo-img">
        <a href="index.html" class="logo-text">Муринопедия</a>
    </div>
    <div class="status-bar">
        Оперативная обстановка: <span style="color: #d33; font-weight: bold;">СТАБИЛЬНАЯ</span>
    </div>
</header>

<div class="editor-wrap" id="editor-wrap">
    <p style="color:#54595d;">Проверка доступа...</p>
</div>

<footer>
    Муринопедия — 2026 год. <br>
    Ч илу доной, пока естч светл. Мурино стояти, Фог дрожати.
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/update_popup.js"></script>
<script src="js/maintenance.js"></script>
<script src="js/alert.js"></script>
<script src="js/ban_check.js"></script>
<script src="js/theme.js"></script>
<script>
let currentUser = null
let currentRole = null
let isFounder = false
let infoboxFields = []
let codeBlocks = []
let coverUrl = ''
let contentImageUrl = ''

async function init() {
    const { data: { session } } = await supabaseClient.auth.getSession()
    if (!session) { showDenied('Нрт идентификации — войди вч систему'); return }

    const { data: user } = await supabaseClient
        .from('users').select('username, role').eq('id', session.user.id).single()

    if (!user) { showDenied('Людич нрт найденол вч реестре'); return }

    currentUser = user.username
    currentRole = user.role
    renderEditor()
}

function showDenied(msg) {
    document.getElementById('editor-wrap').innerHTML = `
        <div class="access-denied">
            <h2>Доступ закрытч</h2>
            <p>${msg}</p>
            <a href="login.html" class="btn btn-primary">Войти вч систему</a>
        </div>
    `
}

function renderEditor() {
    const isMsv = ['м.с.в.проверкость', 'м.с.в.содрунник', 'м.с.в.основательность'].includes(currentRole)
    isFounder = currentRole === 'м.с.в.основательность'

    document.getElementById('editor-wrap').innerHTML = `
        <h1>Новол Знань</h1>

        <div class="editor-grid">
            <div class="field-group">
                <label class="field-label">Название статьи</label>
                <input type="text" class="field-input" id="f-title" placeholder="Мурино, Фог, М.С.В...">
            </div>
            <div class="field-group">
                <label class="field-label">Категория</label>
                <select class="field-input" id="f-tag" onchange="onTagChange(this)">
                    <option value="Локация">Локация</option>
                    <option value="Сущность">Сущность</option>
                    <option value="История">История</option>
                    <option value="Язык">Язык</option>
                    <option value="М.С.В.">М.С.В.</option>
                    <option value="Сезонность">Сезонность</option>
                    <option value="Другол">Другол</option>
                </select>
            </div>
        </div>

        <div class="field-group">
            <label class="field-label">Краткое описание (для карточки)</label>
            <input type="text" class="field-input" id="f-desc" placeholder="Одно предложение о чём статья...">
        </div>

        <div id="season-subsection-wrap" style="display:none;" class="field-group">
            <label class="field-label">Подраздел сезонности</label>
            <select class="field-input" id="f-season-sub" onchange="onSeasonSubChange(this)">
                <option value="">— выбери подраздел —</option>
                <option value="Молочное">Молочное</option>
                <option value="Мурино">Мурино</option>
                <option value="Банька">Банька</option>
                <option value="Красноярость">Красноярость</option>
                <option value="Село">Село</option>
                <option value="Город">Город</option>
                <option value="__custom__">Своё...</option>
            </select>
            <div id="season-custom-wrap" style="display:none;margin-top:8px;">
                <input type="text" class="field-input" id="season-custom" placeholder="Название своего подраздела...">
            </div>
        </div>

        <div class="infobox-section">
            <h3>Инфобокс</h3>
            <div id="infobox-fields"></div>
            <button class="btn btn-secondary" onclick="addInfoboxField()" style="margin-top:8px;">+ Добавить поле</button>
        </div>

        ${isFounder ? `
        <div class="infobox-section" id="code-section">
            <h3>Кодблоки <span style="font-size:0.8em;color:#a2a9b1;">(только основательность)</span></h3>
            <div style="font-size:0.82em;color:#54595d;margin-bottom:10px;">Вставляй в текст через &lt;code1&gt;, &lt;code2&gt; и т.д. Макс. 4 блока.</div>
            <div id="code-blocks-list"></div>
            <button class="btn btn-secondary" onclick="addCodeBlock()" style="margin-top:8px;" id="add-code-btn">+ Добавить блок</button>
        </div>
        ` : ''}

        <div class="image-section">
            <h3>Картинки</h3>
            <div class="image-grid">

                <div class="image-block">
                    <h4>Обложка (инфобокс) — макс. 300×200px</h4>
                    <div class="image-preview" id="cover-preview">Нрт обложки</div>
                    <div class="image-tab-content active" id="cover-content-upload">
                        <div class="upload-zone" onclick="document.getElementById('cover-file').click()">
                            Выбери PNG / JPG / WebP
                            <input type="file" id="cover-file" accept="image/png,image/jpeg,image/webp,image/gif" onchange="uploadImage(this,'cover')">
                        </div>
                        <div class="upload-status" id="cover-upload-status"></div>
                    </div>
                </div>

                <div class="image-block">
                    <h4>Картинка для &lt;image&gt; в тексте — макс. 800×500px</h4>
                    <div class="image-preview" id="content-preview">Нрт картинки</div>
                    <div class="image-tab-content active" id="content-content-upload">
                        <div class="upload-zone" onclick="document.getElementById('content-file').click()">
                            Выбери PNG / JPG / WebP
                            <input type="file" id="content-file" accept="image/png,image/jpeg,image/webp,image/gif" onchange="uploadImage(this,'content')">
                        </div>
                        <div class="upload-status" id="content-upload-status"></div>
                    </div>
                </div>

            </div>
        </div>

        <div class="field-group">
            <label class="field-label">Текст статьи</label>
            <div class="toolbar">
                <button class="toolbar-btn" onclick="insertText('## ', '')">Заголовок</button>
                <button class="toolbar-btn" onclick="insertText('### ', '')">Подзаголовок</button>
                <button class="toolbar-btn" onclick="insertText('**', '**')">Жирный</button>
                <button class="toolbar-btn" onclick="insertText('*', '*')">Курсив</button>
                <button class="toolbar-btn" onclick="insertText('<image>', '')">Картинка</button>
                <button class="toolbar-btn" onclick="insertText('<gif>', '')">GIF</button>
                <button class="toolbar-btn" onclick="insertText('> ', '')">Цитата</button>
                <button class="toolbar-btn" onclick="insertText('- ', '')">Список</button>
                <button class="toolbar-btn" onclick="insertText('1. ', '')">Нумер. список</button>
                <button class="toolbar-btn" onclick="insertTableTemplate()">Таблица</button>
                <button class="toolbar-btn" onclick="insertSpoilerTemplate()">Спойлер</button>
                <button class="toolbar-btn" onclick="insertText('---', '')">Разделитель</button>
            </div>
            <div class="content-hint">
                ## — заголовок, ### — подзаголовок, **жирный**, *курсив*, &lt;image&gt; — картинка, &lt;gif&gt; — анимация, &gt; — цитата, - — список, 1. — нумерованный, --- — разделитель, :::spoiler — скрытый блок.
            </div>
            <textarea class="field-input" id="f-content" placeholder="Пиши Знань здесч..."></textarea>
        </div>

        ${isMsv ? `
        <div class="field-group">
            <label class="field-label">Статус публикации</label>
            <select class="field-input" id="f-status">
                <option value="pending">На проверке</option>
                <option value="published">Опубликовано</option>
            </select>
        </div>
        ` : ''}

        <div class="submit-bar">
            <button class="btn btn-primary" onclick="submitArticle()">Отправити нач проверку</button>
            <a href="articles.html" class="btn btn-secondary">Отменити</a>
            <span class="status-msg" id="submit-status"></span>
        </div>
    `

    renderInfoboxFields()
}

function onTagChange(select) {
    const wrap = document.getElementById('season-subsection-wrap')
    if (wrap) wrap.style.display = select.value === 'Сезонность' ? 'block' : 'none'
}

function onSeasonSubChange(select) {
    const wrap = document.getElementById('season-custom-wrap')
    if (wrap) wrap.style.display = select.value === '__custom__' ? 'block' : 'none'
}

function getSeasonValue() {
    const tag = document.getElementById('f-tag')?.value
    if (tag !== 'Сезонность') return null
    const sub = document.getElementById('f-season-sub')?.value
    if (!sub) return null
    if (sub === '__custom__') {
        return document.getElementById('season-custom')?.value?.trim() || null
    }
    return sub
}

function updatePreview(type, url) {
    const preview = document.getElementById(type + '-preview')
    if (url) {
        preview.innerHTML = `<img src="${url}" onerror="this.parentElement.textContent='Нрт — нрт загружалость'">`
    } else {
        preview.textContent = type === 'cover' ? 'Нрт обложки' : 'Нрт картинки'
    }
}

async function uploadImage(input, type) {
    const file = input.files[0]
    if (!file) return

    const status = document.getElementById(type + '-upload-status')
    status.className = 'upload-status'
    status.textContent = 'Загружати...'

    const ext = file.name.split('.').pop()
    const folder = type === 'cover' ? 'covers' : 'content'
    const fileName = `${folder}/${Date.now()}.${ext}`

    const { error } = await supabaseClient.storage
        .from('images').upload(fileName, file, { upsert: false })

    if (error) {
        status.className = 'upload-status error'
        status.textContent = 'Смертч-шум: ' + error.message
        return
    }

    const { data: urlData } = supabaseClient.storage.from('images').getPublicUrl(fileName)
    const url = urlData.publicUrl

    if (type === 'cover') coverUrl = url
    else contentImageUrl = url

    status.className = 'upload-status success'
    status.textContent = 'Загруженол: ' + file.name
    updatePreview(type, url)
}

function addInfoboxField() {
    infoboxFields.push({ label: '', value: '' })
    renderInfoboxFields()
}

function removeInfoboxField(i) {
    infoboxFields.splice(i, 1)
    renderInfoboxFields()
}

function renderInfoboxFields() {
    const container = document.getElementById('infobox-fields')
    if (!container) return
    container.innerHTML = infoboxFields.map((f, i) => `
        <div class="infobox-row">
            <input type="text" placeholder="Поле (напр. Статус)" value="${f.label}" oninput="infoboxFields[${i}].label = this.value">
            <input type="text" placeholder="Значение" value="${f.value}" oninput="infoboxFields[${i}].value = this.value">
            <button class="btn-remove" onclick="removeInfoboxField(${i})">Удалить</button>
        </div>
    `).join('')
}

function insertText(before, after) {
    const ta = document.getElementById('f-content')
    const start = ta.selectionStart
    const end = ta.selectionEnd
    const selected = ta.value.substring(start, end)
    ta.value = ta.value.substring(0, start) + before + selected + after + ta.value.substring(end)
    ta.focus()
    ta.selectionStart = start + before.length
    ta.selectionEnd = start + before.length + selected.length
}

function insertTableTemplate() {
    const template = '| Заголовок | Заголовок |\n|-----------|-----------|\n| Ячейка    | Ячейка    |\n| Ячейка    | Ячейка    |'
    insertText(template, '')
}

function insertSpoilerTemplate() {
    const template = ':::spoiler Заголовок\nСкрытый текст\n:::'
    insertText(template, '')
}

async function submitArticle() {
    const title = document.getElementById('f-title').value.trim()
    const tag = document.getElementById('f-tag').value
    const desc = document.getElementById('f-desc').value.trim()
    const content = document.getElementById('f-content').value.trim()
    const statusEl = document.getElementById('f-status')
    const status = statusEl ? statusEl.value : 'pending'
    const season = getSeasonValue()
    const msg = document.getElementById('submit-status')

    if (!title) { msg.className = 'status-msg error'; msg.textContent = 'Нрт названия — Фог вч форме'; return }
    if (!content) { msg.className = 'status-msg error'; msg.textContent = 'Нрт текста — пустол Знань'; return }

    msg.className = 'status-msg'
    msg.textContent = 'Отправляти...'

    const { data, error } = await supabaseClient.from('articles').insert({
        title,
        tag,
        description: desc,
        content,
        author: currentUser,
        status,
        cover_url: coverUrl || null,
        image_url: contentImageUrl || null,
        infobox: infoboxFields.filter(f => f.label || f.value),
        code_blocks: codeBlocks.filter(b => b.name && b.content),
        season: season || null
    }).select().single()

    if (error) {
        msg.className = 'status-msg error'
        msg.textContent = 'Смертч-шум: ' + error.message
        return
    }

    msg.className = 'status-msg success'
    msg.textContent = 'Знань отправленол!'

    if (status === 'pending') {
        const { data: msvUsers } = await supabaseClient
            .from('users')
            .select('id')
            .in('role', ['м.с.в.проверкость', 'м.с.в.содрунник', 'м.с.в.основательность'])
        if (msvUsers && msvUsers.length > 0) {
            await supabaseClient.from('notifications').insert(
                msvUsers.map(u => ({
                    user_id: u.id,
                    type: 'review',
                    message: `Новол Знань на проверке: «${title}» от ${currentUser}`,
                    link: `article.html?id=${data.id}`
                }))
            )
        }
    }

    setTimeout(() => { window.location.href = 'article.html?id=' + data.id }, 1000)
}

function addCodeBlock() {
    if (codeBlocks.length >= 4) return
    const idx = codeBlocks.length + 1
    codeBlocks.push({ name: 'code' + idx, content: '' })
    renderCodeBlocks()
    if (codeBlocks.length >= 4) {
        document.getElementById('add-code-btn').style.display = 'none'
    }
}

function removeCodeBlock(i) {
    codeBlocks.splice(i, 1)
    renderCodeBlocks()
    const btn = document.getElementById('add-code-btn')
    if (btn) btn.style.display = 'inline-block'
}

function renderCodeBlocks() {
    const container = document.getElementById('code-blocks-list')
    if (!container) return
    container.innerHTML = codeBlocks.map((b, i) => `
        <div class="code-block-wrap">
            <div class="code-block-header">
                <span style="font-size:0.82em;color:#54595d;">Имя:</span>
                <input type="text" class="code-block-name" value="${b.name}"
                    placeholder="code1"
                    oninput="codeBlocks[${i}].name = this.value.replace(/[^a-zA-Z0-9]/g,''); renderCodeBlockTag(${i})">
                <span class="code-block-tag" id="cb-tag-${i}">&lt;${b.name}&gt;</span>
                <button class="btn-remove" onclick="removeCodeBlock(${i})">Удалить</button>
            </div>
            <textarea class="code-block-textarea"
                placeholder="Вставь HTML код сюда..."
                oninput="codeBlocks[${i}].content = this.value">${b.content}</textarea>
        </div>
    `).join('')
}

function renderCodeBlockTag(i) {
    const tag = document.getElementById('cb-tag-' + i)
    if (tag) tag.textContent = '<' + (codeBlocks[i].name || 'code' + (i+1)) + '>'
}

init()
</script>

</body>
</html>
