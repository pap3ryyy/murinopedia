<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="icon" type="image/png" href="asset/logo.ico">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Новол Знань — Муринопедия</title>
    <link rel="stylesheet" href="css/wiki.css">
    <style>
        .editor-wrap {
            max-width: 900px;
            margin: 30px auto;
            background: #fff;
            border: 1px solid #a2a9b1;
            padding: 30px;
        }

        .editor-wrap h1 {
            font-family: serif;
            font-weight: normal;
            font-size: 1.6em;
            border-bottom: 1px solid #a2a9b1;
            padding-bottom: 10px;
            margin-bottom: 24px;
        }

        .field-group {
            margin-bottom: 18px;
        }

        .field-label {
            font-size: 0.85em;
            font-weight: bold;
            color: #54595d;
            margin-bottom: 5px;
            display: block;
        }

        .field-input {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #a2a9b1;
            font-size: 0.95em;
            background: #f8f9fa;
            color: #202122;
            outline: none;
            font-family: sans-serif;
        }

        .field-input:focus {
            border-color: #3366cc;
            background: #fff;
        }

        select.field-input {
            cursor: pointer;
        }

        textarea.field-input {
            min-height: 300px;
            resize: vertical;
            line-height: 1.6;
        }

        .editor-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .infobox-section {
            border: 1px solid #a2a9b1;
            padding: 15px;
            background: #f8f9fa;
            margin-bottom: 18px;
        }

        .infobox-section h3 {
            margin: 0 0 12px 0;
            font-size: 1em;
            font-family: serif;
            font-weight: normal;
            border-bottom: 1px solid #eaecf0;
            padding-bottom: 6px;
        }

        .infobox-row {
            display: grid;
            grid-template-columns: 1fr 1fr auto;
            gap: 8px;
            margin-bottom: 8px;
            align-items: center;
        }

        .infobox-row input {
            padding: 6px 8px;
            border: 1px solid #a2a9b1;
            font-size: 0.85em;
            background: #fff;
            color: #202122;
            outline: none;
            width: 100%;
        }

        .infobox-row input:focus {
            border-color: #3366cc;
        }

        .btn-remove {
            background: none;
            border: 1px solid #d33;
            color: #d33;
            cursor: pointer;
            padding: 4px 8px;
            font-size: 0.8em;
            border-radius: 2px;
            white-space: nowrap;
        }

        .btn-remove:hover {
            background: #fee7e6;
        }

        .image-tabs {
            display: flex;
            border-bottom: 1px solid #a2a9b1;
            margin-bottom: 10px;
        }

        .image-tab {
            padding: 6px 16px;
            font-size: 0.85em;
            cursor: pointer;
            border: 1px solid transparent;
            border-bottom: none;
            background: none;
            color: #54595d;
            margin-bottom: -1px;
        }

        .image-tab.active {
            background: #fff;
            border-color: #a2a9b1;
            color: #202122;
            font-weight: bold;
        }

        .image-tab-content {
            display: none;
        }

        .image-tab-content.active {
            display: block;
        }

        .image-preview {
            border: 1px solid #a2a9b1;
            background: #f8f9fa;
            padding: 0;
            margin-bottom: 10px;
            text-align: center;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #54595d;
            font-size: 0.85em;
        }

        .image-preview img {
            max-width: 100%;
            max-height: 200px;
            display: block;
            margin: 0 auto;
        }

        .upload-zone {
            border: 2px dashed #a2a9b1;
            background: #f8f9fa;
            padding: 24px;
            text-align: center;
            color: #54595d;
            cursor: pointer;
            transition: border-color 0.15s;
            margin-bottom: 8px;
            font-size: 0.9em;
        }

        .upload-zone:hover {
            border-color: #3366cc;
        }

        .upload-status {
            font-size: 0.8em;
            color: #54595d;
            margin-top: 6px;
        }

        .upload-status.error { color: #d33; }
        .upload-status.success { color: #14866d; }

        .content-hint {
            font-size: 0.8em;
            color: #54595d;
            margin-bottom: 6px;
        }

        .toolbar {
            display: flex;
            gap: 6px;
            margin-bottom: 6px;
            flex-wrap: wrap;
        }

        .toolbar-btn {
            padding: 4px 10px;
            border: 1px solid #a2a9b1;
            background: #f8f9fa;
            font-size: 0.8em;
            cursor: pointer;
            border-radius: 2px;
            color: #202122;
        }

        .toolbar-btn:hover {
            background: #eaecf0;
        }

        .submit-bar {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-top: 24px;
            padding-top: 16px;
            border-top: 1px solid #eaecf0;
        }

        .status-msg {
            font-size: 0.85em;
            color: #54595d;
        }

        .status-msg.error { color: #d33; }
        .status-msg.success { color: #14866d; }

        .access-denied {
            text-align: center;
            padding: 60px 20px;
        }

        .access-denied h2 {
            font-family: serif;
            font-weight: normal;
            color: #d33;
        }
    </style>
</head>
<body>

<header>
    <div class="logo-area">
        <img src="asset/logo.png" alt="М.С.В." class="logo-img">
        <a href="index.html" class="logo-text">Муринопедия</a>
    </div>
    <div class="status-bar">
        Оперативная обстановка: <span style="color: #d33; font-weight: bold;">СТАБИЛЬНАЯ</span>
    </div>
</header>

<div class="editor-wrap" id="editor-wrap">
    <p style="color:#54595d;">Проверка доступа...</p>
</div>

<footer>
    Муринопедия — 2026 год. <br>
    Ч илу доной, пока естч светл. Мурино стояти, Фог дрожати.
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script>
let currentUser = null
let currentRole = null
let infoboxFields = []
let imageUrl = ''
let activeImageTab = 'url'

async function init() {
    const { data: { session } } = await supabaseClient.auth.getSession()

    if (!session) {
        showDenied('Нрт идентификации — войди вч систему')
        return
    }

    const { data: user } = await supabaseClient
        .from('users')
        .select('username, role')
        .eq('id', session.user.id)
        .single()

    if (!user) {
        showDenied('Людич нрт найденол вч реестре')
        return
    }

    currentUser = user.username
    currentRole = user.role
    renderEditor()
}

function showDenied(msg) {
    document.getElementById('editor-wrap').innerHTML = `
        <div class="access-denied">
            <h2>Доступ закрытч</h2>
            <p>${msg}</p>
            <a href="login.html" class="btn btn-primary">Войти вч систему</a>
        </div>
    `
}

function renderEditor() {
    const isMsv = currentRole === 'м.с.в.'

    document.getElementById('editor-wrap').innerHTML = `
        <h1>Новол Знань</h1>

        <div class="editor-grid">
            <div class="field-group">
                <label class="field-label">Название статьи</label>
                <input type="text" class="field-input" id="f-title" placeholder="Мурино, Фог, М.С.В...">
            </div>
            <div class="field-group">
                <label class="field-label">Категория</label>
                <select class="field-input" id="f-tag">
                    <option value="Локация">Локация</option>
                    <option value="Сущность">Сущность</option>
                    <option value="История">История</option>
                    <option value="Язык">Язык</option>
                    <option value="М.С.В.">М.С.В.</option>
                    <option value="Другол">Другол</option>
                </select>
            </div>
        </div>

        <div class="field-group">
            <label class="field-label">Краткое описание (для карточки)</label>
            <input type="text" class="field-input" id="f-desc" placeholder="Одно предложение о чём статья...">
        </div>

        <div class="infobox-section">
            <h3>Инфобокс</h3>
            <div id="infobox-fields"></div>
            <button class="btn btn-secondary" onclick="addInfoboxField()" style="margin-top:8px;">+ Добавить поле</button>
        </div>

        <div class="field-group">
            <label class="field-label">Картинка статьи</label>

            <div class="image-preview" id="img-preview">Нрт картинки</div>

            <div class="image-tabs">
                <button class="image-tab active" id="tab-url" onclick="switchImageTab('url')">По URL</button>
                <button class="image-tab" id="tab-upload" onclick="switchImageTab('upload')">Загрузити файл</button>
            </div>

            <div class="image-tab-content active" id="tab-content-url">
                <input type="text" class="field-input" id="img-url-input" placeholder="https://example.com/image.png" oninput="previewImageUrl(this.value)">
            </div>

            <div class="image-tab-content" id="tab-content-upload">
                <div class="upload-zone" onclick="document.getElementById('file-input').click()">
                    Нажми дляч выбора PNG / JPG / WebP
                    <input type="file" id="file-input" accept="image/png,image/jpeg,image/webp" onchange="uploadFile(this)">
                </div>
                <div class="upload-status" id="upload-status"></div>
            </div>
        </div>

        <div class="field-group">
            <label class="field-label">Текст статьи</label>
            <div class="toolbar">
                <button class="toolbar-btn" onclick="insertText('## ', '')">Заголовок</button>
                <button class="toolbar-btn" onclick="insertText('### ', '')">Подзаголовок</button>
                <button class="toolbar-btn" onclick="insertText('**', '**')">Жирный</button>
                <button class="toolbar-btn" onclick="insertText('*', '*')">Курсив</button>
                <button class="toolbar-btn" onclick="insertText('<image>', '')">Картинка</button>
                <button class="toolbar-btn" onclick="insertText('> ', '')">Цитата</button>
            </div>
            <div class="content-hint">Используй &lt;image&gt; дляч вставки картинки вч тексте. ## — заголовок, ### — подзаголовок, **текст** — жирный.</div>
            <textarea class="field-input" id="f-content" placeholder="Пиши Знань здесч..."></textarea>
        </div>

        ${isMsv ? `
        <div class="field-group">
            <label class="field-label">Статус публикации</label>
            <select class="field-input" id="f-status">
                <option value="pending">На проверке</option>
                <option value="published">Опубликовано</option>
            </select>
        </div>
        ` : ''}

        <div class="submit-bar">
            <button class="btn btn-primary" onclick="submitArticle()">Отправити нач проверку</button>
            <a href="articles.html" class="btn btn-secondary">Отменити</a>
            <span class="status-msg" id="submit-status"></span>
        </div>
    `

    renderInfoboxFields()
}

function switchImageTab(tab) {
    activeImageTab = tab
    document.getElementById('tab-url').classList.toggle('active', tab === 'url')
    document.getElementById('tab-upload').classList.toggle('active', tab === 'upload')
    document.getElementById('tab-content-url').classList.toggle('active', tab === 'url')
    document.getElementById('tab-content-upload').classList.toggle('active', tab === 'upload')
}

function previewImageUrl(url) {
    imageUrl = url
    updatePreview(url)
}

function updatePreview(url) {
    const preview = document.getElementById('img-preview')
    if (url) {
        preview.innerHTML = `<img src="${url}" onerror="this.parentElement.textContent='Нрт — картинка нрт загружалость'">`
    } else {
        preview.textContent = 'Нрт картинки'
    }
}

async function uploadFile(input) {
    const file = input.files[0]
    if (!file) return

    const status = document.getElementById('upload-status')
    status.className = 'upload-status'
    status.textContent = 'Загружати...'

    const ext = file.name.split('.').pop()
    const fileName = `${Date.now()}.${ext}`

    const { data, error } = await supabaseClient.storage
        .from('images')
        .upload(fileName, file, { upsert: false })

    if (error) {
        status.className = 'upload-status error'
        status.textContent = 'Смертч-шум: ' + error.message
        return
    }

    const { data: urlData } = supabaseClient.storage
        .from('images')
        .getPublicUrl(fileName)

    imageUrl = urlData.publicUrl
    status.className = 'upload-status success'
    status.textContent = 'Загруженол: ' + file.name
    updatePreview(imageUrl)
}

function addInfoboxField() {
    infoboxFields.push({ label: '', value: '' })
    renderInfoboxFields()
}

function removeInfoboxField(i) {
    infoboxFields.splice(i, 1)
    renderInfoboxFields()
}

function renderInfoboxFields() {
    const container = document.getElementById('infobox-fields')
    if (!container) return
    container.innerHTML = infoboxFields.map((f, i) => `
        <div class="infobox-row">
            <input type="text" placeholder="Поле (напр. Статус)" value="${f.label}" oninput="infoboxFields[${i}].label = this.value">
            <input type="text" placeholder="Значение" value="${f.value}" oninput="infoboxFields[${i}].value = this.value">
            <button class="btn-remove" onclick="removeInfoboxField(${i})">Удалить</button>
        </div>
    `).join('')
}

function insertText(before, after) {
    const ta = document.getElementById('f-content')
    const start = ta.selectionStart
    const end = ta.selectionEnd
    const selected = ta.value.substring(start, end)
    ta.value = ta.value.substring(0, start) + before + selected + after + ta.value.substring(end)
    ta.focus()
    ta.selectionStart = start + before.length
    ta.selectionEnd = start + before.length + selected.length
}

async function submitArticle() {
    const title = document.getElementById('f-title').value.trim()
    const tag = document.getElementById('f-tag').value
    const desc = document.getElementById('f-desc').value.trim()
    const content = document.getElementById('f-content').value.trim()
    const statusEl = document.getElementById('f-status')
    const status = statusEl ? statusEl.value : 'pending'
    const msg = document.getElementById('submit-status')

    if (!title) { msg.className = 'status-msg error'; msg.textContent = 'Нрт названия — Фог вч форме'; return }
    if (!content) { msg.className = 'status-msg error'; msg.textContent = 'Нрт текста — пустол Знань'; return }

    msg.className = 'status-msg'
    msg.textContent = 'Отправляти...'

    const { data, error } = await supabaseClient.from('articles').insert({
        title,
        tag,
        description: desc,
        content,
        author: currentUser,
        status,
        image_url: imageUrl || null,
        infobox: infoboxFields.filter(f => f.label || f.value)
    }).select().single()

    if (error) {
        msg.className = 'status-msg error'
        msg.textContent = 'Смертч-шум: ' + error.message
        return
    }

    msg.className = 'status-msg success'
    msg.textContent = 'Знань отправленол!'

    setTimeout(() => {
        window.location.href = 'article.html?id=' + data.id
    }, 1000)
}

init()
</script>

</body>
</html>
