<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="icon" type="image/png" href="asset/logo.ico">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Трек — Мурино FM</title>
    <link rel="stylesheet" href="css/wiki.css">
    <style>
        .track-stage {
            background: #0d0d14;
            border: 1px solid #a2a9b1;
            position: relative;
            overflow: hidden;
            margin-bottom: 14px;
        }
        #particles-canvas {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none; z-index: 2;
        }
        #visualizer-canvas { display: block; width: 100%; position: relative; z-index: 3; }
        .waveform-wrap {
            position: relative; height: 32px;
            background: #0a0a12; cursor: pointer; z-index: 4;
        }
        #wf-canvas { display: block; width: 100%; height: 32px; }
        .wf-marker {
            position: absolute; top: 0; bottom: 0; width: 2px;
            background: rgba(255,200,0,0.7); pointer-events: none;
        }
        .track-controls {
            background: #111118; padding: 8px 12px;
            display: flex; align-items: center; gap: 10px;
            border-top: 1px solid #1e1e2e; position: relative; z-index: 4;
        }
        .ctrl-play {
            width: 30px; height: 30px; background: #3366cc;
            border: none; border-radius: 50%; color: #fff;
            font-size: 0.9em; cursor: pointer; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            position: relative; transition: transform 0.15s;
        }
        .ctrl-play::after {
            content: ''; position: absolute; inset: -4px;
            border-radius: 50%; border: 2px solid transparent;
        }
        .ctrl-play.playing::after {
            border-color: rgba(51,102,204,0.5);
            animation: ringPulse 1.5s ease-in-out infinite;
        }
        @keyframes ringPulse {
            0%,100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.4); opacity: 0; }
        }
        .ctrl-play:hover { background: #2a4b8d; transform: scale(1.08); }
        .ctrl-btn { background: none; border: none; color: #e4e4e7; cursor: pointer; padding: 0; }
        .ctrl-btn:hover { color: #3366cc; }
        .progress-wrap {
            flex: 1; height: 3px; background: #2a2a3a;
            cursor: pointer; border-radius: 2px;
        }
        .progress-wrap:hover { height: 5px; }
        .progress-fill {
            height: 100%; background: linear-gradient(90deg, #3366cc, #7aa7f7);
            border-radius: 2px; width: 0%;
            box-shadow: 0 0 5px rgba(51,102,204,0.5);
        }
        .time-label { font-size: 0.75em; color: #a1a1aa; white-space: nowrap; min-width: 30px; }
        .vol-wrap { display: flex; align-items: center; gap: 4px; }
        .vol-wrap span { color: #a1a1aa; font-size: 0.85em; }
        .vol-wrap input { width: 55px; cursor: pointer; }
        .track-like-btn {
            border: 1px solid #a2a9b1; background: #f8f9fa;
            padding: 3px 10px; cursor: pointer; font-size: 0.85em; color: #54595d;
            transition: all 0.15s;
        }
        .track-like-btn.liked { border-color: #d33; color: #d33; background: #fff0f0; }
        .track-like-btn:hover { transform: scale(1.05); }
        .track-like-btn:active { transform: scale(0.95); }
        .eq-bars { display: none; align-items: flex-end; gap: 2px; height: 18px; margin-left: 8px; vertical-align: middle; }
        .eq-bars.active { display: inline-flex; }
        .eq-bars span { width: 3px; background: #3366cc; border-radius: 1px; animation: eqAnim 0.7s ease-in-out infinite alternate; }
        .eq-bars span:nth-child(2) { animation-delay: 0.15s; }
        .eq-bars span:nth-child(3) { animation-delay: 0.3s; }
        .eq-bars span:nth-child(4) { animation-delay: 0.1s; }
        @keyframes eqAnim { from { height: 3px; } to { height: 16px; } }
        .tc-item { padding: 5px 0; border-bottom: 1px solid #eaecf0; font-size: 0.86em; }
        .tc-item:last-child { border-bottom: none; }
        .tc-ts {
            display: inline-block; background: #eaf0fb; color: #3366cc;
            padding: 1px 5px; font-size: 0.8em; border-radius: 2px;
            cursor: pointer; margin-right: 4px; font-family: monospace;
        }
        .tc-ts:hover { background: #3366cc; color: #fff; }
        .tc-author { font-weight: bold; margin-right: 4px; }
        .tc-bubble {
            position: absolute; background: rgba(51,102,204,0.1);
            border: 1px solid #3366cc; border-radius: 3px;
            padding: 2px 7px; font-size: 0.78em; color: #202122;
            white-space: nowrap; pointer-events: none; top: 2px;
            animation: tcfade 4s ease forwards;
        }
        @keyframes tcfade {
            0% { opacity: 0; transform: translateY(4px); }
            10% { opacity: 1; transform: translateY(0); }
            80% { opacity: 1; } 100% { opacity: 0; }
        }
        body.dark .track-stage { border-color: #3f3f46; }
        body.dark .track-like-btn { border-color: #3f3f46; color: #a1a1aa; background: #27272a; }
        body.dark .track-like-btn.liked { border-color: #d33; color: #d33; background: #2d1a1a; }
        body.dark .tc-item { border-bottom-color: #3f3f46; }
    </style>
</head>
<body>
<header>
    <div class="logo-area">
        <img src="asset/logo.png" alt="М.С.В." class="logo-img">
        <a href="index.html" class="logo-text">Муринопедия</a>
    </div>
    <div id="header-user"></div>
</header>

<div class="container">
    <div class="main-content" id="main-content">
        <p style="color:#54595d;">Загружати...</p>
    </div>
    <div class="sidebar">
        <div class="sidebar-box">
            <div class="sidebar-box-title">Навигация</div>
            <ul style="margin:0;padding-left:18px;font-size:0.88em;line-height:1.8;">
                <li><a href="index.html">Главная</a></li>
                <li><a href="music.html">← Мурино FM</a></li>
            </ul>
        </div>
        <div class="sidebar-box" id="sidebar-related">
            <div class="sidebar-box-title">Другие треки</div>
            <div id="related-list" style="font-size:0.88em;">...</div>
        </div>
    </div>
</div>

<footer>
    Муринопедия — 2026 год.<br>
    Ч илу доной, пока естч светл. Мурино стояти, Фог дрожати.
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/ban_check.js"></script>
<script src="js/theme.js"></script>
<script src="js/player.js"></script>
<script>
let currentUser = null, track = null, audio = null
let audioCtx = null, analyser = null, animFrame = null
let isPlaying = false, isRepeat = false, liked = false, comments = []

function safe(s){if(!s)return '';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;')}
function fmt(s){if(!s||isNaN(s))return '0:00';const m=Math.floor(s/60),sc=Math.floor(s%60);return m+':'+(sc<10?'0':'')+sc}

const trackId = parseInt(new URLSearchParams(location.search).get('id'))

async function init() {
    const { data: { session } } = await supabaseClient.auth.getSession()
    if (session) {
        const { data: u } = await supabaseClient.from('users').select('username,role,public_id').eq('id', session.user.id).single()
        if (u) {
            currentUser = u
            document.getElementById('header-user').innerHTML = `
                <a href="profile.html?id=${u.public_id}" style="color:#0645ad;font-size:0.85em;">${safe(u.username)}</a>&nbsp;
                <a href="settings.html" style="padding:3px 10px;border:1px solid #a2a9b1;background:#f8f9fa;font-size:0.85em;color:#202122;text-decoration:none;">Настройки</a>&nbsp;
                <button onclick="supabaseClient.auth.signOut().then(()=>location.reload())" style="padding:3px 10px;border:1px solid #a2a9b1;background:#f8f9fa;cursor:pointer;font-size:0.85em;">Выйти</button>
            `
            const { data: lk } = await supabaseClient.from('track_likes').select('track_id').eq('track_id', trackId).eq('user_id', session.user.id)
            liked = !!(lk && lk.length > 0)
        }
    }

    if (!trackId) { document.getElementById('main-content').innerHTML = '<p style="color:#d33;">Трек не знайдено.</p>'; return }
    const { data: t } = await supabaseClient.from('tracks').select('*').eq('id', trackId).eq('status','published').single()
    if (!t) { document.getElementById('main-content').innerHTML = '<p style="color:#d33;">Трек не знайдено или ещё на проверке.</p>'; return }
    track = t
    document.title = `${t.title} — Мурино FM`

    renderPage()
    loadComments()
    loadRelated()

    // Счётчик просмотров
    const session2 = (await supabaseClient.auth.getSession()).data.session
    if (session2) {
        const { data: ex } = await supabaseClient.from('track_views').select('track_id').eq('track_id', trackId).eq('user_id', session2.user.id).maybeSingle()
        if (!ex) {
            await supabaseClient.from('track_views').insert({ track_id: trackId, user_id: session2.user.id })
            await supabaseClient.from('tracks').update({ plays_count: (track.plays_count||0)+1 }).eq('id', trackId)
        }
    } else {
        const key = 'played_'+trackId
        if (!sessionStorage.getItem(key)) {
            sessionStorage.setItem(key, '1')
            await supabaseClient.from('tracks').update({ plays_count: (track.plays_count||0)+1 }).eq('id', trackId)
        }
    }
}

function renderPage() {
    const isVideo = track.file_type === 'video/mp4'
    document.getElementById('main-content').innerHTML = `
        <h1 style="font-family:serif;font-weight:normal;font-size:1.9em;border-bottom:1px solid #a2a9b1;padding-bottom:6px;margin-bottom:14px;">
            ${safe(track.title)}
            <span class="eq-bars" id="eq-bars"><span></span><span></span><span></span><span></span></span>
        </h1>

        <table class="article-infobox" style="float:right;clear:right;margin:0 0 16px 20px;width:200px;">
            <tr><th colspan="2" style="text-align:center;font-family:serif;font-size:1em;font-weight:normal;padding:8px;background:#eaecf0;">
                ${isVideo ? '🎬 Видео-мешап' : '🎵 Аудио-трек'}
            </th></tr>
            <tr>
                <td style="padding:4px 8px;font-size:0.82em;color:#54595d;">Автор</td>
                <td style="padding:4px 8px;font-size:0.85em;"><b>@${safe(track.author)}</b></td>
            </tr>
            ${track.mashup_source ? `
            <tr>
                <td style="padding:4px 8px;font-size:0.82em;color:#54595d;">Оригинал</td>
                <td style="padding:4px 8px;font-size:0.85em;">${safe(track.mashup_source)}</td>
            </tr>` : ''}
            <tr>
                <td style="padding:4px 8px;font-size:0.82em;color:#54595d;">Загружено</td>
                <td style="padding:4px 8px;font-size:0.85em;">${safe(track.uploaded_by)}</td>
            </tr>
            <tr>
                <td style="padding:4px 8px;font-size:0.82em;color:#54595d;">Дата</td>
                <td style="padding:4px 8px;font-size:0.85em;">${new Date(track.created_at).toLocaleDateString('ru-RU')}</td>
            </tr>
            <tr>
                <td style="padding:4px 8px;font-size:0.82em;color:#54595d;">Прослушиваний</td>
                <td style="padding:4px 8px;font-size:0.85em;">${track.plays_count||0}</td>
            </tr>
            <tr><td colspan="2" style="padding:6px 8px;text-align:center;border-top:1px solid #a2a9b1;">
                <button class="track-like-btn ${liked?'liked':''}" id="like-btn" onclick="toggleLike()">♥ <span id="like-count">${track.likes_count||0}</span></button>
            </td></tr>
        </table>

        ${isVideo ? `
            <video id="track-media" src="${track.file_url}" controls preload="auto"
                style="max-width:100%;display:block;border:1px solid #a2a9b1;margin-bottom:14px;">
            </video>
        ` : `
            <div id="track-stage" class="track-stage">
                <canvas id="particles-canvas"></canvas>
                <canvas id="visualizer-canvas" height="130"></canvas>
                <div class="waveform-wrap" id="wf-wrap" onclick="seekWf(event)">
                    <canvas id="wf-canvas" height="32"></canvas>
                </div>
                <div class="track-controls">
                    <button class="ctrl-play" id="btn-play" onclick="togglePlay()">▶</button>
                    <span class="time-label" id="time-cur">0:00</span>
                    <div class="progress-wrap" onclick="seekClick(event)">
                        <div class="progress-fill" id="progress-fill"></div>
                    </div>
                    <span class="time-label" id="time-dur">0:00</span>
                    <button class="ctrl-btn" id="btn-repeat" onclick="toggleRepeat()" title="Повтор">🔁</button>
                    <div class="vol-wrap">
                        <span>🔊</span>
                        <input type="range" min="0" max="1" step="0.05" value="0.8" oninput="setVol(this.value)">
                    </div>
                </div>
            </div>
        `}

        <div style="clear:both;"></div>

        <div class="sidebar-box" style="margin-top:14px;">
            <div class="sidebar-box-title">Комментарии к моментам</div>
            <div style="padding:8px;">
                <div style="font-size:0.78em;color:#a2a9b1;margin-bottom:6px;">Нажми на таймкод — перемотает трек.</div>
                <div id="tc-stream" style="height:26px;position:relative;overflow:hidden;margin-bottom:4px;"></div>
                <div id="tc-list" style="max-height:160px;overflow-y:auto;"><p style="color:#a2a9b1;font-size:0.85em;margin:0;">Нрт комментариев</p></div>
                ${currentUser ? `
                <div style="display:flex;gap:8px;margin-top:10px;">
                    <input type="text" id="tc-input" placeholder="Комментарий к моменту..." maxlength="200"
                        onkeydown="if(event.key==='Enter')sendComment()"
                        style="flex:1;padding:5px 9px;border:1px solid #a2a9b1;font-size:0.86em;background:#f8f9fa;outline:none;">
                    <button class="btn btn-primary" style="font-size:0.82em;padding:4px 12px;" onclick="sendComment()">→</button>
                </div>
                <div style="font-size:0.76em;color:#a2a9b1;margin-top:3px;">Привязывается к текущей позиции трека</div>
                ` : `<div style="font-size:0.85em;color:#54595d;margin-top:6px;"><a href="login.html" style="color:#0645ad;">Войди</a> чтобы комментировать</div>`}
            </div>
        </div>

        <div style="margin-top:10px;font-size:0.85em;">
            <a href="music.html" style="color:#0645ad;">← Все треки Мурино FM</a>
        </div>
    `

    if (isVideo) {
        audio = document.getElementById('track-media')
        audio.addEventListener('play', () => setPlayingState(true))
        audio.addEventListener('pause', () => setPlayingState(false))
        audio.addEventListener('ended', () => { setPlayingState(false); if(isRepeat){audio.currentTime=0;audio.play()} })
    } else {
        setupAudio()
    }
}

function setupAudio() {
    audio = new Audio(track.file_url)
    audio.crossOrigin = 'anonymous'
    audio.volume = 0.8
    audio.addEventListener('loadedmetadata', () => {
        const dur = document.getElementById('time-dur')
        if (dur) dur.textContent = fmt(audio.duration)
        drawWaveform()
    })
    audio.addEventListener('timeupdate', onTimeUpdate)
    audio.addEventListener('ended', () => {
        if (isRepeat) { audio.currentTime = 0; audio.play() }
        else { isPlaying = false; setPlayingState(false); stopVisualizer() }
    })
    // Запускаем в глобальном плеере (он будет играть при переходе на другие страницы)
    MurinoFM.play(track)
}

function togglePlay() {
    if (!audio) return
    if (isPlaying) {
        audio.pause(); isPlaying = false
        setPlayingState(false); stopVisualizer()
    } else {
        if (!audioCtx) setupVisualizer()
        audio.play(); isPlaying = true
        setPlayingState(true); startVisualizer()
    }
}

function toggleRepeat() {
    isRepeat = !isRepeat
    const b = document.getElementById('btn-repeat')
    if (b) b.style.color = isRepeat ? '#3366cc' : ''
}

function seekClick(e) {
    if (!audio || !audio.duration) return
    const rect = e.currentTarget.getBoundingClientRect()
    audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration
}

function seekWf(e) {
    if (!audio || !audio.duration) return
    const rect = e.currentTarget.getBoundingClientRect()
    audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration
}

function setVol(v) { if (audio) audio.volume = parseFloat(v) }

function onTimeUpdate() {
    if (!audio || !audio.duration) return
    const pct = (audio.currentTime / audio.duration) * 100
    const fill = document.getElementById('progress-fill')
    const cur = document.getElementById('time-cur')
    if (fill) fill.style.width = pct + '%'
    if (cur) cur.textContent = fmt(audio.currentTime)
    showTimedComments(audio.currentTime)
}

function setPlayingState(playing) {
    const btn = document.getElementById('btn-play')
    const eq = document.getElementById('eq-bars')
    if (btn) { btn.textContent = playing ? '⏸' : '▶'; btn.classList.toggle('playing', playing) }
    if (eq) eq.classList.toggle('active', playing)
}

// ── Particles ──
const particlesList = []
function initParticles() {
    const c = document.getElementById('particles-canvas'); if (!c) return
    const s = document.getElementById('track-stage'); if (!s) return
    c.width = s.offsetWidth; c.height = s.offsetHeight
}
function spawnParticle(intensity) {
    const c = document.getElementById('particles-canvas'); if (!c) return
    for (let i = 0; i < Math.floor(intensity * 3); i++) {
        particlesList.push({
            x: Math.random()*c.width, y: c.height,
            vx: (Math.random()-0.5)*1.5,
            vy: -(Math.random()*2+0.5)*intensity,
            life: 1, decay: Math.random()*0.015+0.008,
            size: Math.random()*3+1, hue: 200+Math.random()*60
        })
    }
}
function drawParticles() {
    const c = document.getElementById('particles-canvas'); if (!c) return
    const ctx = c.getContext('2d')
    ctx.clearRect(0,0,c.width,c.height)
    for (let i = particlesList.length-1; i >= 0; i--) {
        const p = particlesList[i]
        p.x+=p.vx; p.y+=p.vy; p.life-=p.decay
        if (p.life<=0) { particlesList.splice(i,1); continue }
        ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2)
        ctx.fillStyle = `hsla(${p.hue},80%,65%,${p.life})` ; ctx.fill()
    }
}

// ── Visualizer ──
function setupVisualizer() {
    try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)()
        const src = audioCtx.createMediaElementSource(audio)
        analyser = audioCtx.createAnalyser(); analyser.fftSize = 256
        src.connect(analyser); analyser.connect(audioCtx.destination)
    } catch(e) { console.warn('Visualizer unavailable', e) }
}
function startVisualizer() {
    const canvas = document.getElementById('visualizer-canvas')
    if (!canvas || !analyser) return
    initParticles()
    const ctx = canvas.getContext('2d')
    const buf = new Uint8Array(analyser.frequencyBinCount)
    function draw() {
        animFrame = requestAnimationFrame(draw)
        analyser.getByteFrequencyData(buf)
        const W = canvas.width = canvas.offsetWidth, H = canvas.height = 130
        ctx.fillStyle = '#0d0d14'; ctx.fillRect(0,0,W,H)
        const bw = W/buf.length*2.5
        let avg = 0
        for (let i = 0; i < buf.length; i++) {
            const h = (buf[i]/255)*H; avg += buf[i]
            const hue = 220+(buf[i]/255)*60
            ctx.fillStyle = `hsl(${hue},80%,${40+(buf[i]/255)*30}%)`
            ctx.shadowColor = buf[i]>180 ? `hsl(${hue},80%,60%)` : 'transparent'
            ctx.shadowBlur = buf[i]>180 ? 6 : 0
            ctx.fillRect(i*(bw+1),H-h,bw,h)
        }
        ctx.shadowBlur = 0
        avg = avg/buf.length/255
        if (avg > 0.15) spawnParticle(avg)
        drawParticles()
    }
    draw()
}
function stopVisualizer() {
    if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null }
    const c = document.getElementById('visualizer-canvas')
    if (c) { const ctx = c.getContext('2d'); ctx.fillStyle='#0d0d14'; ctx.fillRect(0,0,c.width,c.height) }
}
function drawWaveform() {
    const c = document.getElementById('wf-canvas'); if (!c) return
    const W = c.width = c.offsetWidth||600, H = 32
    const ctx = c.getContext('2d')
    ctx.fillStyle = '#0a0a12'; ctx.fillRect(0,0,W,H)
    ctx.strokeStyle = '#2a4b8d'; ctx.lineWidth = 1; ctx.beginPath()
    for (let x = 0; x < W; x++) {
        const h = (Math.random()*0.6+0.1)*H*0.8
        ctx.moveTo(x,H/2-h/2); ctx.lineTo(x,H/2+h/2)
    }
    ctx.stroke(); renderWfMarkers()
}
function renderWfMarkers() {
    const wrap = document.getElementById('wf-wrap'); if (!wrap||!audio||!audio.duration) return
    wrap.querySelectorAll('.wf-marker').forEach(m=>m.remove())
    comments.filter(c=>c.timestamp_sec!==null).forEach(c=>{
        const pct = (c.timestamp_sec/audio.duration)*100
        const m = document.createElement('div')
        m.className='wf-marker'; m.style.left=pct+'%'; m.title=fmt(c.timestamp_sec)+': '+c.content
        m.onclick = () => { audio.currentTime = c.timestamp_sec }
        wrap.appendChild(m)
    })
}

// ── Timed bubbles ──
let shownComments = new Set()
function showTimedComments(sec) {
    comments.forEach(c => {
        if (c.timestamp_sec===null||shownComments.has(c.id)) return
        if (Math.abs(c.timestamp_sec-sec) < 0.5) {
            shownComments.add(c.id)
            const stream = document.getElementById('tc-stream'); if (!stream) return
            const b = document.createElement('div')
            b.className='tc-bubble'; b.style.left=Math.random()*60+'%'
            b.textContent=c.username+': '+c.content
            stream.appendChild(b); setTimeout(()=>b.remove(),4200)
        }
    })
}

// ── Comments ──
async function loadComments() {
    const { data } = await supabaseClient.from('track_comments').select('*').eq('track_id',trackId).order('timestamp_sec',{ascending:true,nullsFirst:false})
    comments = data||[]; shownComments = new Set()
    renderComments(); renderWfMarkers()
}
function renderComments() {
    const list = document.getElementById('tc-list'); if (!list) return
    if (!comments.length) { list.innerHTML='<p style="color:#a2a9b1;font-size:0.85em;margin:0;">Нрт комментариев</p>'; return }
    list.innerHTML = comments.map(c=>`
        <div class="tc-item">
            ${c.timestamp_sec!==null?`<span class="tc-ts" onclick="seekTo(${c.timestamp_sec})">${fmt(c.timestamp_sec)}</span>`:''}
            <span class="tc-author">${safe(c.username)}</span>${safe(c.content)}
            ${currentUser&&(currentUser.username===c.username||['м.с.в.содрунник','м.с.в.основательность'].includes(currentUser.role))
                ?`<span onclick="deleteComment(${c.id})" style="float:right;cursor:pointer;color:#a2a9b1;font-size:0.8em;">✕</span>`:''}
        </div>
    `).join('')
}
async function sendComment() {
    const input = document.getElementById('tc-input')
    const content = input.value.trim(); if (!content||!currentUser) return
    const { data: { session } } = await supabaseClient.auth.getSession(); if (!session) return
    const tsec = (audio&&audio.duration) ? Math.floor(audio.currentTime) : null
    await supabaseClient.from('track_comments').insert({ track_id:trackId, user_id:session.user.id, username:currentUser.username, content, timestamp_sec:tsec })
    input.value=''; loadComments()
}
async function deleteComment(id) {
    await supabaseClient.from('track_comments').delete().eq('id',id); loadComments()
}
function seekTo(sec) {
    if (!audio) return
    audio.currentTime = sec
    if (!isPlaying) togglePlay()
}

// ── Like ──
async function toggleLike() {
    if (!currentUser) return
    const { data: { session } } = await supabaseClient.auth.getSession(); if (!session) return
    const btn = document.getElementById('like-btn'), cnt = document.getElementById('like-count')
    if (liked) {
        await supabaseClient.from('track_likes').delete().eq('track_id',trackId).eq('user_id',session.user.id)
        await supabaseClient.from('tracks').update({ likes_count:Math.max(0,(track.likes_count||0)-1) }).eq('id',trackId)
        track.likes_count = Math.max(0,(track.likes_count||0)-1)
        liked=false; btn.className='track-like-btn'
    } else {
        await supabaseClient.from('track_likes').insert({ track_id:trackId, user_id:session.user.id })
        await supabaseClient.from('tracks').update({ likes_count:(track.likes_count||0)+1 }).eq('id',trackId)
        track.likes_count = (track.likes_count||0)+1
        liked=true; btn.className='track-like-btn liked'
    }
    cnt.textContent = track.likes_count
}

// ── Related ──
async function loadRelated() {
    const { data } = await supabaseClient.from('tracks').select('id,title,author').eq('status','published').neq('id',trackId).limit(5)
    if (!data||!data.length) { document.getElementById('sidebar-related').style.display='none'; return }
    document.getElementById('related-list').innerHTML = data.map(t=>
        `<div style="padding:4px 0;border-bottom:1px solid #eaecf0;font-size:0.85em;">
            <a href="track.html?id=${t.id}" style="color:#0645ad;">${safe(t.title)}</a>
            <div style="color:#a2a9b1;font-size:0.78em;">@${safe(t.author)}</div>
        </div>`
    ).join('')
}

init()
</script>
