<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="icon" type="image/png" href="asset/logo.ico">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Загрузити трек — Мурино FM</title>
    <link rel="stylesheet" href="css/wiki.css">
    <style>
        .upload-wrap {
            max-width: 640px;
            margin: 0 auto;
        }
        .field-group { margin-bottom: 16px; }
        .field-label { font-size: 0.85em; font-weight: bold; color: #54595d; margin-bottom: 4px; display: block; }
        .field-input {
            width: 100%; padding: 7px 10px; border: 1px solid #a2a9b1;
            font-size: 0.92em; background: #f8f9fa; color: #202122;
            outline: none; font-family: sans-serif; box-sizing: border-box;
        }
        .field-input:focus { border-color: #3366cc; background: #fff; }
        .checkbox-row { display: flex; align-items: center; gap: 8px; font-size: 0.9em; margin-bottom: 10px; }
        .upload-zone {
            border: 2px dashed #a2a9b1; background: #f8f9fa;
            padding: 22px; text-align: center; color: #54595d;
            cursor: pointer; font-size: 0.88em;
        }
        .upload-zone:hover { border-color: #3366cc; }
        .upload-zone.has-file { border-color: #14866d; background: #f0fff4; }
        .file-status { font-size: 0.82em; margin-top: 6px; color: #54595d; }
        .file-status.error { color: #d33; }
        .file-preview { margin-top: 10px; }
        .file-preview video, .file-preview audio { width: 100%; }
        .mashup-extra { display: none; }
        .watermark-row { display: none; }
        body.dark .upload-zone { background: #27272a; border-color: #3f3f46; color: #a1a1aa; }
        body.dark .upload-zone.has-file { background: #1b2d1b; }
    </style>
</head>
<body>
<header>
    <div class="logo-area">
        <img src="asset/logo.png" alt="М.С.В." class="logo-img">
        <a href="index.html" class="logo-text">Муринопедия</a>
    </div>
    <div id="header-user"></div>
</header>

<div class="container">
    <div class="main-content">
        <div class="upload-wrap" id="upload-wrap">
            <p style="color:#54595d;">Проверка доступа...</p>
        </div>
    </div>
    <div class="sidebar">
        <div class="sidebar-box">
            <div class="sidebar-box-title">Навигация</div>
            <ul style="margin:0;padding-left:18px;font-size:0.88em;line-height:1.8;">
                <li><a href="index.html">Главная</a></li>
                <li><a href="music.html">← Мурино FM</a></li>
            </ul>
        </div>
        <div class="sidebar-box">
            <div class="sidebar-box-title">Правила загрузки</div>
            <ul style="margin:0;padding-left:18px;font-size:0.85em;color:#54595d;line-height:1.7;">
                <li>Только MP3 или MP4</li>
                <li>Макс. 50MB</li>
                <li>Указывай автора мешапа</li>
                <li>После загрузки — проверка МСВ</li>
            </ul>
        </div>
    </div>
</div>

<footer>
    Муринопедия — 2026 год.<br>
    Ч илу доной, пока естч светл. Мурино стояти, Фог дрожати.
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/ban_check.js"></script>
<script src="js/theme.js"></script>
<script src="js/player.js"></script><script>
let currentUser = null, fileType = null, isMp4 = false

function safe(s){if(!s)return '';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;')}

async function init() {
    const { data: { session } } = await supabaseClient.auth.getSession()
    if (!session) {
        document.getElementById('upload-wrap').innerHTML = `
            <div style="text-align:center;padding:40px;">
                <p style="color:#d33;font-family:serif;font-size:1.2em;">Доступ закрытч</p>
                <p>Войди чтобы загрузить трек.</p>
                <a href="login.html" class="btn btn-primary">Войти</a>
            </div>`
        return
    }
    const { data: u } = await supabaseClient.from('users').select('username,role,public_id').eq('id', session.user.id).single()
    if (!u) return
    currentUser = u
    document.getElementById('header-user').innerHTML = `
        <a href="profile.html?id=${u.public_id}" style="color:#0645ad;font-size:0.85em;">${safe(u.username)}</a>&nbsp;
        <a href="settings.html" style="padding:3px 10px;border:1px solid #a2a9b1;background:#f8f9fa;font-size:0.85em;color:#202122;text-decoration:none;">Настройки</a>&nbsp;
        <button onclick="supabaseClient.auth.signOut().then(()=>location.reload())" style="padding:3px 10px;border:1px solid #a2a9b1;background:#f8f9fa;cursor:pointer;font-size:0.85em;">Выйти</button>
    `
    renderForm()
}

function renderForm() {
    document.getElementById('upload-wrap').innerHTML = `
        <h1 style="font-family:serif;font-weight:normal;font-size:1.5em;border-bottom:1px solid #a2a9b1;padding-bottom:8px;margin-bottom:16px;">
            🎵 Загрузить трек — Мурино FM
        </h1>
        <div class="field-group">
            <label class="field-label">Название трека *</label>
            <input type="text" class="field-input" id="f-title" placeholder="Название...">
        </div>
        <div class="field-group">
            <label class="field-label">Автор мешапа (ник в TikTok или платформе) *</label>
            <input type="text" class="field-input" id="f-author" placeholder="@ник">
        </div>
        <div class="checkbox-row">
            <input type="checkbox" id="is-mashup" onchange="toggleMashup(this.checked)">
            <label for="is-mashup">Это мешап</label>
        </div>
        <div class="mashup-extra" id="mashup-extra">
            <div class="field-group">
                <label class="field-label">Название оригинального трека *</label>
                <input type="text" class="field-input" id="f-source" placeholder="Оригинал...">
            </div>
        </div>
        <div class="field-group">
            <label class="field-label">Файл * (MP3 или MP4, макс. 50MB)</label>
            <div class="upload-zone" id="upload-zone" onclick="document.getElementById('track-file').click()">
                <div>📁 Нажми чтобы выбрать файл</div>
                <div style="font-size:0.8em;color:#a2a9b1;margin-top:3px;">MP3 или MP4</div>
                <input type="file" id="track-file" accept="audio/mpeg,video/mp4" style="display:none;" onchange="handleFile(this)">
            </div>
            <div class="file-status" id="file-status"></div>
            <div class="file-preview" id="file-preview"></div>
        </div>
        <div class="watermark-row" id="watermark-row">
            <div class="checkbox-row">
                <input type="checkbox" id="trim-wm">
                <label for="trim-wm">Скачано с водяным знаком TikTok — обрезать последние 5 секунд</label>
            </div>
        </div>
        <div style="display:flex;gap:10px;align-items:center;margin-top:16px;padding-top:14px;border-top:1px solid #eaecf0;">
            <button class="btn btn-primary" onclick="submitTrack()">Отправити на проверку</button>
            <a href="music.html" class="btn btn-secondary">Отменити</a>
            <span id="submit-msg" style="font-size:0.85em;"></span>
        </div>
    `
}

function toggleMashup(v) {
    document.getElementById('mashup-extra').style.display = v ? 'block' : 'none'
}

function handleFile(input) {
    const file = input.files[0]; if (!file) return
    const status = document.getElementById('file-status')
    const zone = document.getElementById('upload-zone')
    const preview = document.getElementById('file-preview')
    const wmRow = document.getElementById('watermark-row')
    if (file.size > 50*1024*1024) { status.className='file-status error'; status.textContent='Слишком большой файл (макс. 50MB)'; return }
    isMp4 = file.type === 'video/mp4'
    fileType = file.type
    zone.classList.add('has-file')
    status.className = 'file-status'
    status.textContent = `${file.name} (${(file.size/1024/1024).toFixed(1)}MB)`
    const url = URL.createObjectURL(file)
    preview.innerHTML = isMp4
        ? `<video src="${url}" controls style="width:100%;max-height:200px;"></video>`
        : `<audio src="${url}" controls style="width:100%;"></audio>`
    wmRow.style.display = isMp4 ? 'block' : 'none'
}

async function submitTrack() {
    const title = document.getElementById('f-title').value.trim()
    const author = document.getElementById('f-author').value.trim()
    const isMashup = document.getElementById('is-mashup').checked
    const source = isMashup ? document.getElementById('f-source').value.trim() : null
    const fileInput = document.getElementById('track-file')
    const msg = document.getElementById('submit-msg')

    if (!title) { msg.style.color='#d33'; msg.textContent='Нрт названия'; return }
    if (!author) { msg.style.color='#d33'; msg.textContent='Нрт автора'; return }
    if (isMashup && !source) { msg.style.color='#d33'; msg.textContent='Укажи оригинальный трек'; return }
    if (!fileInput.files[0]) { msg.style.color='#d33'; msg.textContent='Нрт файла'; return }

    msg.style.color='#54595d'; msg.textContent='Загружати файл...'
    const file = fileInput.files[0]
    const ext = isMp4 ? 'mp4' : 'mp3'
    const fileName = `tracks/${Date.now()}.${ext}`
    const trimWm = isMp4 && document.getElementById('trim-wm').checked

    const { error: upErr } = await supabaseClient.storage.from('tracks').upload(fileName, file, { upsert: false })
    if (upErr) { msg.style.color='#d33'; msg.textContent='Ошибка загрузки: '+upErr.message; return }

    const { data: urlData } = supabaseClient.storage.from('tracks').getPublicUrl(fileName)
    msg.textContent = 'Сохраняти...'

    const { error } = await supabaseClient.from('tracks').insert({
        title, author, mashup_source: source,
        file_url: urlData.publicUrl, file_type: fileType,
        uploaded_by: currentUser.username, status: 'pending',
        trim_watermark: trimWm
    })

    if (error) { msg.style.color='#d33'; msg.textContent='Ошибка: '+error.message; return }

    const { data: msvUsers } = await supabaseClient.from('users').select('id')
        .in('role', ['м.с.в.проверкость','м.с.в.содрунник','м.с.в.основательность'])
    if (msvUsers?.length) {
        await supabaseClient.from('notifications').insert(
            msvUsers.map(u => ({ user_id: u.id, type: 'review', message: `Новый трек на проверке: «${title}» от ${currentUser.username}`, link: 'music.html' }))
        )
    }

    msg.style.color='#14866d'; msg.textContent='Отправленол на проверку!'
    setTimeout(() => { window.location.href = 'music.html' }, 1200)
}

init()
</script>
</body>
</html>
