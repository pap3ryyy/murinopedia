<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="icon" type="image/png" href="asset/logo.ico">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Штаб М.С.В. — Муринопедия</title>
    <link rel="stylesheet" href="css/wiki.css">
    <style>
        .admin-tabs { display: flex; border-bottom: 2px solid #a2a9b1; margin-bottom: 24px; }
        .admin-tab { padding: 6px 18px; font-size: 0.9em; cursor: pointer; border: 1px solid transparent; border-bottom: none; background: none; color: #54595d; margin-bottom: -2px; }
        .admin-tab.active { background: #fff; border-color: #a2a9b1; color: #202122; font-weight: bold; border-bottom: 2px solid #fff; }
        .admin-tab-content { display: none; }
        .admin-tab-content.active { display: block; }
        .pending-list { display: flex; flex-direction: column; gap: 16px; }
        .pending-card { border: 1px solid #a2a9b1; background: #f8f9fa; padding: 16px; }
        .pending-card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 8px; }
        .pending-card-title { font-family: serif; font-size: 1.2em; font-weight: normal; }
        .pending-card-meta { font-size: 0.82em; color: #54595d; margin-bottom: 8px; }
        .pending-card-actions { display: flex; gap: 8px; align-items: center; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; margin-bottom: 24px; }
        .stat-card { border: 1px solid #a2a9b1; background: #f8f9fa; padding: 14px; text-align: center; }
        .stat-number { font-family: serif; font-size: 1.8em; color: #3366cc; display: block; }
        .stat-label { font-size: 0.8em; color: #54595d; }
        .users-table { width: 100%; border-collapse: collapse; font-size: 0.9em; }
        .users-table th { background: #eaecf0; border: 1px solid #a2a9b1; padding: 6px 10px; text-align: left; }
        .users-table td { border: 1px solid #a2a9b1; padding: 6px 10px; vertical-align: middle; }
        .users-table tr:nth-child(even) td { background: #f8f9fa; }
        .role-badge { display: inline-block; padding: 2px 7px; border-radius: 2px; font-size: 0.8em; font-weight: bold; }
        .role-badge.msv { background: #cee0f2; color: #3366cc; border: 1px solid #3366cc; }
        .role-badge.ludich { background: #eaecf0; color: #54595d; border: 1px solid #a2a9b1; }
        .empty-state { text-align: center; padding: 40px 20px; color: #54595d; font-style: italic; }
        .access-denied { text-align: center; padding: 80px 20px; }
        .access-denied h2 { font-family: serif; font-weight: normal; color: #d33; }
        .admin-user-bar { font-size: 0.82em; color: #54595d; display: flex; gap: 10px; align-items: center; }
    </style>
</head>
<body>

<header>
    <div class="logo-area">
        <img src="asset/logo.png" alt="М.С.В." class="logo-img">
        <a href="index.html" class="logo-text">Муринопедия</a>
    </div>
    <div style="display:flex;align-items:center;gap:12px;">
        <div class="status-bar">
            Оперативная обстановка: <span style="color: #d33; font-weight: bold;">СТАБИЛЬНАЯ</span>
        </div>
        <div class="admin-user-bar">
            <span id="admin-username"></span>
            <button onclick="logout()" style="padding:3px 10px;border:1px solid #a2a9b1;background:#f8f9fa;cursor:pointer;font-size:0.85em;border-radius:2px;">Выйти</button>
        </div>
    </div>
</header>

<div class="container">
    <main id="admin-main">
        <p style="color:#54595d;">Проверка доступа М.С.В....</p>
    </main>
    <aside>
        <div class="sidebar-box">
            <h4>Штаб М.С.В.</h4>
            <p>Панель управления Архивом Знань. Доступ только дляч проверенных М.С.В.</p>
        </div>
        <div class="sidebar-box">
            <h4>Навигация</h4>
            <p>
                <a href="index.html">Главная</a><br>
                <a href="articles.html">Архив Знань</a>
            </p>
        </div>
    </aside>
</div>

<footer>Муринопедия — 2026 год.</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script>
let adminUser = null;
let adminUserId = null;

async function init() {
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (!session) return showDenied('Нрт идентификации');

    const { data: user } = await supabaseClient.from('users').select('*').eq('id', session.user.id).single();

    if (!user || user.role !== 'м.с.в.') return showDenied('Доступ только дляч М.С.В.');

    adminUser = user.username;
    adminUserId = user.id;
    document.getElementById('admin-username').textContent = adminUser;
    renderAdmin();
}

function showDenied(msg) {
    document.getElementById('admin-main').innerHTML = `
        <div class="access-denied">
            <h2>Доступ закрытч</h2>
            <p>${msg}</p>
            <a href="index.html" class="btn btn-secondary">← На главную</a>
        </div>
    `;
}

function renderAdmin() {
    document.getElementById('admin-main').innerHTML = `
        <h1 style="font-family:serif;font-weight:normal;font-size:1.8em;border-bottom:1px solid #a2a9b1;padding-bottom:5px;margin-bottom:16px;">Штаб М.С.В.</h1>
        <div class="admin-tabs">
            <button class="admin-tab active" onclick="switchTab('pending', this)">На проверке</button>
            <button class="admin-tab" onclick="switchTab('stats', this)">Статистика</button>
            <button class="admin-tab" onclick="switchTab('users', this)">Людич</button>
        </div>
        <div class="admin-tab-content active" id="tab-pending"><div id="pending-list">Загрузка...</div></div>
        <div class="admin-tab-content" id="tab-stats"><div id="stats-content">Загрузка...</div></div>
        <div class="admin-tab-content" id="tab-users"><div id="users-content">Загрузка...</div></div>
    `;
    loadPending();
}

function switchTab(name, btn) {
    document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.admin-tab-content').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + name).classList.add('active');
    if (name === 'stats') loadStats();
    if (name === 'users') loadUsers();
}

async function loadPending() {
    const { data } = await supabaseClient.from('articles').select('*').eq('status', 'pending');
    const container = document.getElementById('pending-list');
    if (!data || data.length === 0) return container.innerHTML = '<div class="empty-state">Пусто</div>';
    container.innerHTML = data.map(a => `
        <div class="pending-card">
            <div class="pending-card-title">${a.title}</div>
            <div class="pending-card-meta">Автор: ${a.author}</div>
            <div class="pending-card-actions">
                <button class="btn btn-primary" onclick="approveArticle(${a.id})">Принять</button>
                <button class="btn btn-danger" onclick="rejectArticle(${a.id})">Удалить</button>
            </div>
        </div>
    `).join('');
}

async function approveArticle(id) {
    await supabaseClient.from('articles').update({ status: 'published', reviewed_by: adminUser }).eq('id', id);
    loadPending();
}

async function rejectArticle(id) {
    if (confirm('Удалить статью?')) {
        await supabaseClient.from('articles').delete().eq('id', id);
        loadPending();
    }
}

async function loadStats() {
    const [a, u] = await Promise.all([
        supabaseClient.from('articles').select('status'),
        supabaseClient.from('users').select('id')
    ]);
    document.getElementById('stats-content').innerHTML = `
        <div class="stats-grid">
            <div class="stat-card"><span class="stat-number">${a.data.filter(x=>x.status==='published').length}</span><span class="stat-label">Статей</span></div>
            <div class="stat-card"><span class="stat-number">${u.data.length}</span><span class="stat-label">Людич</span></div>
        </div>
    `;
}

async function loadUsers() {
    const { data } = await supabaseClient.from('users').select('*').order('created_at', { ascending: false });
    document.getElementById('users-content').innerHTML = `
        <table class="users-table">
            <thead><tr><th>Позывной</th><th>Роль</th><th>Действия</th></tr></thead>
            <tbody>
                ${data.map(u => `
                    <tr>
                        <td>${u.username}</td>
                        <td><span class="role-badge ${u.role==='м.с.в.'?'msv':'ludich'}">${u.role}</span></td>
                        <td>
                            ${(u.id !== adminUserId && u.role !== 'м.с.в.') ? `
                                <button class="btn btn-danger" onclick="deleteUser('${u.id}')">Удалить аккаунт</button>
                            ` : '—'}
                        </td>
                    </tr>
                `).join('')}
            </tbody>
        </table>
    `;
}

async function deleteUser(userId) {
    if (confirm('Вы уверены, что хотите безвозвратно удалить этот аккаунт из Архива?')) {
        const { error } = await supabaseClient.from('users').delete().eq('id', userId);
        if (error) alert('Ошибка удаления');
        loadUsers();
    }
}

async function logout() { await supabaseClient.auth.signOut(); window.location.href = 'login.html'; }
init();
</script>
</body>
</html>```
