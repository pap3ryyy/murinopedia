<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="icon" type="image/png" href="asset/logo.ico">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Настройки — Муринопедия</title>
    <link rel="stylesheet" href="css/wiki.css">
    <style>
        .settings-wrap {
            max-width: 600px;
            margin: 30px auto;
            background: #fff;
            border: 1px solid #a2a9b1;
            padding: 30px;
        }
        .settings-wrap h1 {
            font-family: serif;
            font-weight: normal;
            font-size: 1.6em;
            border-bottom: 1px solid #a2a9b1;
            padding-bottom: 10px;
            margin-bottom: 24px;
        }
        .setting-group {
            margin-bottom: 24px;
        }
        .setting-label {
            font-size: 0.85em;
            font-weight: bold;
            color: #54595d;
            margin-bottom: 10px;
            display: block;
        }
        .theme-options {
            display: flex;
            gap: 0;
            border: 1px solid #a2a9b1;
            width: fit-content;
        }
        .theme-option {
            border: none;
            border-right: 1px solid #a2a9b1;
            padding: 8px 18px;
            cursor: pointer;
            font-size: 0.9em;
            background: #f8f9fa;
            color: #202122;
        }
        .theme-option:last-child { border-right: none; }
        .theme-option:hover { background: #eaecf0; }
        .theme-option.active {
            background: #3366cc;
            color: #fff;
            font-weight: bold;
        }
        .save-status {
            font-size: 0.85em;
            margin-top: 12px;
            color: #54595d;
        }
        .save-status.success { color: #14866d; }
        .save-status.error { color: #d33; }

        body.dark .settings-wrap {
            background: #1e1e2e;
            border-color: #3d3d5c;
            color: #cdd6f4;
        }
        body.dark .setting-label { color: #a6adc8; }
        body.dark .theme-option {
            background: #27272a;
            border-right-color: #3f3f46;
            color: #e4e4e7;
        }
        body.dark .theme-option:hover { background: #3f3f46; }
        body.dark .theme-option.active {
            background: #3366cc;
            color: #fff;
        }
    </style>
</head>
<body>

<header>
    <div class="logo-area">
        <img src="asset/logo.png" alt="М.С.В." class="logo-img">
        <a href="index.html" class="logo-text">Муринопедия</a>
    </div>
    <div id="header-user"></div>
</header>

<div class="settings-wrap">
    <h1>Настройки</h1>

    <div class="setting-group">
        <span class="setting-label">Тема оформления</span>
        <div class="theme-options">
            <button class="theme-option" id="theme-light" onclick="setTheme('light')">☀️ Светлая</button>
            <button class="theme-option" id="theme-dark" onclick="setTheme('dark')">🌙 Тёмная</button>
        </div>
        <div class="save-status" id="save-status"></div>
    </div>
</div>

<footer>
    Муринопедия — 2026 год. <br>
    Ч илу доной, пока естч светл. Мурино стояти, Фог дрожати.
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/ban_check.js"></script>
<script>
let currentTheme = 'light'

async function init() {
    const { data: { session } } = await supabaseClient.auth.getSession()
    if (!session) { window.location.href = 'login.html'; return }

    const { data: user } = await supabaseClient
        .from('users').select('theme').eq('id', session.user.id).single()

    currentTheme = user?.theme || 'light'
    applyTheme(currentTheme)
    updateButtons(currentTheme)
}

function applyTheme(theme) {
    if (theme === 'dark') {
        document.body.classList.add('dark')
    } else {
        document.body.classList.remove('dark')
    }
}

function updateButtons(theme) {
    document.getElementById('theme-light').classList.toggle('active', theme === 'light')
    document.getElementById('theme-dark').classList.toggle('active', theme === 'dark')
}

async function setTheme(theme) {
    const status = document.getElementById('save-status')
    status.className = 'save-status'
    status.textContent = 'Сохраняти...'

    const { data: { session } } = await supabaseClient.auth.getSession()
    const { error } = await supabaseClient
        .from('users').update({ theme }).eq('id', session.user.id)

    if (error) {
        status.className = 'save-status error'
        status.textContent = 'Смертч-шум: ' + error.message
        return
    }

    currentTheme = theme
    applyTheme(theme)
    updateButtons(theme)
    status.className = 'save-status success'
    status.textContent = 'Сохраненол!'
    setTimeout(() => { status.textContent = '' }, 2000)
}

init()
</script>
<script src="js/theme.js"></script>
<script src="js/player.js"></script></body>
</html>
