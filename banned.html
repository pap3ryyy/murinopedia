<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Доступ ограничен — Муринопедия</title>
    <link rel="stylesheet" href="css/wiki.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #eaecf0;
            font-family: sans-serif;
        }
        .banned-container {
            background: #fff;
            border: 1px solid #a2a9b1;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            width: 100%;
            max-width: 700px;
            padding: 50px;
            text-align: left;
            position: relative;
        }
        .banned-container h1 {
            font-family: serif;
            font-size: 2.5em;
            color: #d33;
            margin: 0 0 20px 0;
            font-weight: normal;
            border-bottom: 1px solid #d33;
            padding-bottom: 10px;
        }
        .info-row {
            margin: 15px 0;
            font-size: 1.1em;
            color: #202122;
        }
        .info-row b {
            color: #54595d;
            width: 150px;
            display: inline-block;
        }
        .reason-text {
            background: #fee7e6;
            border-left: 5px solid #d33;
            padding: 15px;
            margin: 25px 0;
            font-style: italic;
        }
        .btn-home {
            margin-top: 30px;
            background: #3366cc;
            color: #fff;
            border: none;
            padding: 12px 24px;
            font-size: 1em;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-home:hover {
            background: #447ff5;
        }
    </style>
</head>
<body>

<div class="banned-container">
    <h1>Вы были забанены</h1>
    
    <div class="info-row">
        <b>Администратор:</b> <span id="admin-name">Загрузка...</span>
    </div>
    
    <div class="info-row">
        <b>Срок бана:</b> <span id="ban-time">Загрузка...</span>
    </div>

    <div class="reason-text" id="ban-reason">
        Загрузка причины...
    </div>

    <p style="color: #54595d; font-size: 0.9em;">
        Если вы считаете, что это ошибка, обратитесь кч М.С.В. лично. <br>
        Ваша сессия будет аннулирована при возвращении на главную.
    </p>

    <button class="btn-home" onclick="exit()">Вернуться на главную (разлогиниться)</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script>
    async function loadBanInfo() {
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (!session) { location.href = 'index.html'; return; }

        const { data: user } = await supabaseClient
            .from('users')
            .select('banned_by, ban_reason, ban_until')
            .eq('id', session.user.id)
            .single();

        if (user) {
            document.getElementById('admin-name').textContent = user.banned_by || 'Штаб М.С.В.';
            document.getElementById('ban-reason').textContent = user.ban_reason || 'Причина не указана';
            
            if (user.ban_until) {
                const date = new Date(user.ban_until);
                document.getElementById('ban-time').textContent = 'До ' + date.toLocaleString('ru-RU');
            } else {
                document.getElementById('ban-time').textContent = 'Навсегда';
            }
        }
    }

    async function exit() {
        await supabaseClient.auth.signOut();
        window.location.href = 'index.html';
    }

    loadBanInfo();
</script>

</body>
</html>
