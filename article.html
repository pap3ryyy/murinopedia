<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="icon" type="image/png" href="asset/logo.ico">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Знань — Муринопедия</title>
    <link rel="stylesheet" href="css/wiki.css">
    <style>
        .article-infobox {
            float: right;
            clear: right;
            margin: 0 0 20px 20px;
            background: #f8f9fa;
            border: 1px solid #a2a9b1;
            font-size: 0.9em;
            min-width: 180px;
            max-width: 260px;
        }

        .infobox-title {
            background: #cee0f2;
            text-align: center;
            font-weight: bold;
            padding: 6px;
            display: block;
            font-size: 1em;
            font-family: serif;
        }

        .infobox-image {
            width: 100%;
            overflow: hidden;
            max-height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #eaecf0;
        }

        .infobox-image img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            display: block;
        }

        .infobox-table {
            width: 100%;
            border-collapse: collapse;
        }

        .infobox-table td {
            padding: 4px 8px;
            vertical-align: top;
            border-top: 1px solid #eaecf0;
            font-size: 0.88em;
        }

        .infobox-table td:first-child {
            font-weight: bold;
            color: #54595d;
            white-space: nowrap;
            width: 42%;
        }

        .meta-infobox {
            float: right;
            clear: right;
            margin: 0 0 20px 20px;
            background: #f8f9fa;
            border: 1px solid #a2a9b1;
            font-size: 0.85em;
            min-width: 180px;
            max-width: 260px;
        }

        .meta-infobox .infobox-title {
            background: #eaecf0;
            color: #54595d;
            font-size: 0.9em;
        }

        .review-badge {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 2px;
            font-size: 0.8em;
            font-weight: bold;
        }

        .review-badge.verified { background: #d4f5e9; color: #14866d; border: 1px solid #14866d; }
        .review-badge.msv { background: #cee0f2; color: #3366cc; border: 1px solid #3366cc; }
        .review-badge.pending { background: #fef6e4; color: #c8a850; border: 1px solid #c8a850; }

        .article-content { line-height: 1.7; }

        .article-content h2 {
            font-family: serif;
            font-weight: normal;
            font-size: 1.4em;
            border-bottom: 1px solid #a2a9b1;
            padding-bottom: 3px;
            margin-top: 24px;
        }

        .article-content h3 {
            font-family: serif;
            font-size: 1.15em;
            margin-top: 18px;
        }

        .article-content blockquote {
            border-left: 3px solid #a2a9b1;
            margin: 12px 0 12px 20px;
            padding: 4px 12px;
            color: #54595d;
            font-style: italic;
        }

        .article-content .content-image {
            max-width: 100%;
            max-height: 500px;
            width: auto;
            height: auto;
            border: 1px solid #a2a9b1;
            margin: 12px 0;
            display: block;
            object-fit: contain;
        }

        .article-content .inline-image-placeholder {
            border: 2px dashed #a2a9b1;
            background: #f8f9fa;
            padding: 20px;
            text-align: center;
            color: #54595d;
            font-size: 0.85em;
            margin: 10px 0;
        }

        .article-actions {
            display: flex;
            gap: 8px;
            margin-top: 20px;
            padding-top: 12px;
            border-top: 1px solid #eaecf0;
            flex-wrap: wrap;
        }

        .like-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 20px;
            padding: 12px 0;
            border-top: 1px solid #eaecf0;
            font-size: 0.9em;
            color: #54595d;
        }

        .like-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border: 1px solid #a2a9b1;
            background: #f8f9fa;
            cursor: pointer;
            font-size: 0.9em;
            border-radius: 2px;
            color: #202122;
            transition: background 0.1s;
        }

        .like-btn:hover { background: #eaecf0; }

        .like-btn.liked {
            background: #cee0f2;
            border-color: #3366cc;
            color: #3366cc;
            font-weight: bold;
        }

        .views-count { color: #a2a9b1; font-size: 0.85em; }

        .comments-section {
            margin-top: 32px;
            padding-top: 20px;
            border-top: 2px solid #a2a9b1;
        }

        .comments-section h2 {
            font-family: serif;
            font-weight: normal;
            font-size: 1.3em;
            margin-bottom: 16px;
        }

        .comment-form { margin-bottom: 24px; }

        .comment-form textarea {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #a2a9b1;
            font-size: 0.9em;
            background: #f8f9fa;
            color: #202122;
            outline: none;
            font-family: sans-serif;
            resize: vertical;
            min-height: 80px;
        }

        .comment-form textarea:focus { border-color: #3366cc; background: #fff; }

        .comment-form-actions {
            display: flex;
            gap: 8px;
            margin-top: 6px;
            align-items: center;
        }

        .comment {
            border-left: 3px solid #eaecf0;
            padding: 10px 14px;
            margin-bottom: 14px;
            background: #f8f9fa;
        }

        .comment.reply {
            margin-left: 24px;
            border-left-color: #cee0f2;
            background: #f0f4ff;
        }

        .comment-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 6px;
            font-size: 0.85em;
        }

        .comment-author { font-weight: bold; color: #0645ad; }
        .comment-date { color: #a2a9b1; }

        .comment-content {
            font-size: 0.9em;
            line-height: 1.5;
            margin-bottom: 8px;
        }

        .comment-actions { display: flex; gap: 12px; font-size: 0.8em; }

        .comment-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: #54595d;
            padding: 0;
            font-size: 0.85em;
        }

        .comment-btn:hover { color: #0645ad; }
        .comment-btn.liked { color: #3366cc; font-weight: bold; }

        .reply-form { margin-top: 10px; display: none; }
        .reply-form.visible { display: block; }

        .reply-form textarea {
            width: 100%;
            padding: 6px 8px;
            border: 1px solid #a2a9b1;
            font-size: 0.85em;
            background: #fff;
            color: #202122;
            outline: none;
            font-family: sans-serif;
            resize: vertical;
            min-height: 60px;
        }

        .reply-form textarea:focus { border-color: #3366cc; }
        .reply-form-actions { display: flex; gap: 6px; margin-top: 4px; }

        .no-comments { color: #54595d; font-size: 0.9em; font-style: italic; }

        .login-prompt {
            background: #f8f9fa;
            border: 1px solid #a2a9b1;
            padding: 12px;
            font-size: 0.9em;
            color: #54595d;
        }

        .state-box {
            padding: 40px 20px;
            text-align: center;
            border: 1px solid #a2a9b1;
            background: #f8f9fa;
        }

        .state-box-title { font-family: serif; font-size: 1.3em; margin-bottom: 8px; }

        .state-box.error { border-color: #d33; background: #fee7e6; }
        .state-box.error .state-box-title { color: #d33; }

        .pinned-badge {
            display: inline-block;
            background: #fef6e4;
            border: 1px solid #c8a850;
            color: #c8a850;
            font-size: 0.7em;
            padding: 2px 8px;
            font-weight: bold;
            margin-right: 8px;
            vertical-align: middle;
        }
    </style>
</head>
<body>

<header>
    <div class="logo-area">
        <img src="asset/logo.png" alt="М.С.В." class="logo-img">
        <a href="index.html" class="logo-text">Муринопедия</a>
    </div>
    <div style="display:flex;align-items:center;gap:12px;">
        <div class="status-bar">
            Оперативная обстановка: <span style="color: #d33; font-weight: bold;">СТАБИЛЬНАЯ</span>
        </div>
        <div id="header-user" style="font-size:0.85em;color:#54595d;"></div>
    </div>
</header>

<div class="container">
    <main id="main-content">
        <p style="color:#54595d;">Загружати Знань...</p>
    </main>
    <aside>
        <div class="sidebar-box">
            <h4>Навигация</h4>
            <p><a href="articles.html">← Архив Знань</a></p>
        </div>
        <div class="sidebar-box" style="border-color: #d33; background: #fee7e6;">
            <h4 style="color:#d33;">Напоминание</h4>
            <p>Видл слово «Друг»? Ог — мимикрия Фога. Говори <b>Друн</b>.</p>
        </div>
    </aside>
</div>

<footer>
    Муринопедия — 2026 год. <br>
    Ч илу доной, пока естч светл. Мурино стояти, Фог дрожати.
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script>
let currentUser = null
let currentUserId = null
let currentUserPublicId = null
let currentRole = null

function isMsv() {
    return ['м.с.в.проверкость', 'м.с.в.содрунник', 'м.с.в.основательность'].includes(currentRole)
}
function canDelete() {
    return ['м.с.в.содрунник', 'м.с.в.основательность'].includes(currentRole)
}
let articleId = null
let userCommentLikes = new Set()
let articleLiked = false
let authorPublicIds = {}
let authorData = {}

async function init() {
    const params = new URLSearchParams(window.location.search)
    articleId = params.get('id')
    if (!articleId) { showError('Нрт идентификатора Знань'); return }

    const { data: { session } } = await supabaseClient.auth.getSession()
    if (session) {
        currentUserId = session.user.id
        const { data: user } = await supabaseClient
            .from('users').select('username, role, public_id').eq('id', session.user.id).single()
        if (user) {
            currentUser = user.username
            currentRole = user.role
            currentUserPublicId = user.public_id
        }
    }

    await loadArticle()
    renderHeaderUser()
}

function renderHeaderUser() {
    const el = document.getElementById('header-user')
    if (!el) return
    if (currentUser) {
        el.innerHTML = `<a href="profile.html?id=${currentUserPublicId}" style="color:#0645ad;">${currentUser}</a> &nbsp;<button onclick="logout()" style="padding:3px 10px;border:1px solid #a2a9b1;background:#f8f9fa;cursor:pointer;font-size:0.85em;border-radius:2px;">Выйти</button>`
    } else {
        el.innerHTML = `<a href="login.html" style="font-size:0.85em;">Войти</a>`
    }
}

async function logout() {
    await supabaseClient.auth.signOut()
    window.location.href = 'login.html'
}

async function loadArticle() {
    const { data: article, error } = await supabaseClient
        .from('articles').select('*').eq('id', articleId).single()

    if (error || !article) { showError('Знань нрт найденол — возможно Фог скрылость его'); return }
    if (article.status !== 'published' && !isMsv()) {
        showError('Это Знань ещё нач проверке вч М.С.В.')
        return
    }

    if (currentUserId) {
        const { error: viewError } = await supabaseClient.from('article_views')
            .insert({ article_id: articleId, user_id: currentUserId })
        if (!viewError) {
            await supabaseClient.from('articles')
                .update({ views_count: (article.views_count ?? 0) + 1 }).eq('id', articleId)
        }
    }

    if (currentUserId) {
        const { data: alreadyLiked } = await supabaseClient
            .from('article_likes').select('article_id')
            .eq('article_id', articleId).eq('user_id', currentUserId).single()
        articleLiked = !!alreadyLiked
    }

    // Подгружаем данные автора
    if (article.author) {
        const { data: aData } = await supabaseClient
            .from('users').select('public_id, banner_url, avatar_url, name_color, title')
            .eq('username', article.author).single()
        if (aData) {
            authorPublicIds[article.author] = aData.public_id
            authorData = aData
        }

        // Значки автора
        if (authorData && authorPublicIds[article.author]) {
            const { data: authorUser } = await supabaseClient
                .from('users').select('id').eq('username', article.author).single()
            if (authorUser) {
                const { data: badges } = await supabaseClient
                    .from('user_badges')
                    .select('badges(id, name, description, icon_url)')
                    .eq('user_id', authorUser.id)
                authorData.badges = badges ?? []
            }
        }
    }

    document.title = article.title + ' — Муринопедия'

    renderArticle(article)
    await loadUserCommentLikes()
    await loadComments()
}

function renderReviewBadge(article) {
    if (article.status === 'pending') return `<span class="review-badge pending">На проверке</span>`
    if (article.reviewed_by) return `<span class="review-badge verified">Проверена — ${article.reviewed_by}</span>`
    return `<span class="review-badge msv">Опубликована без проверки (М.С.В.)</span>`
}

function renderMetaInfobox(article) {
    const created = new Date(article.created_at).toLocaleDateString('ru-RU')
    const reviewed = article.reviewed_at ? new Date(article.reviewed_at).toLocaleDateString('ru-RU') : '—'
    const authorPid = authorPublicIds[article.author]
    const badges = (authorData.badges ?? []).map(ub => {
        const b = ub.badges
        return `<span style="position:relative;display:inline-flex;align-items:center;margin-left:3px;" class="badge-wrap">
            <img src="${b.icon_url}" style="width:16px;height:16px;object-fit:contain;vertical-align:middle;cursor:help;" title="${b.description ?? b.name}">
        </span>`
    }).join('')
    const nameColor = authorData.name_color ? `color:${authorData.name_color};` : ''
    const authorHtml = authorPid
        ? `<a href="profile.html?id=${authorPid}" style="${nameColor}">${article.author ?? 'Аноним'}</a>${badges}`
        : `${article.author ?? 'Аноним'}${badges}`
    return `
        <div class="meta-infobox">
            <span class="infobox-title">Сведения о Знань</span>
            <table class="infobox-table">
                <tr><td>Автор</td><td>${authorHtml}</td></tr>
                <tr><td>Категория</td><td>${article.tag ?? '—'}</td></tr>
                <tr><td>Создано</td><td>${created}</td></tr>
                <tr><td>Проверено</td><td>${reviewed}</td></tr>
                <tr><td>Статус</td><td>${renderReviewBadge(article)}</td></tr>
                <tr><td>Просмотры</td><td>${(article.views_count ?? 0) + 1}</td></tr>
                <tr><td>Лайки</td><td>${article.likes_count ?? 0}</td></tr>
            </table>
        </div>
    `
}

function renderContentInfobox(article) {
    const fields = article.infobox ?? []
    const hasCover = article.cover_url
    const hasFields = fields.length > 0
    if (!hasCover && !hasFields) return ''
    return `
        <div class="article-infobox">
            <span class="infobox-title">${article.title}</span>
            ${hasCover ? `<div class="infobox-image"><img src="${article.cover_url}" alt="${article.title}"></div>` : ''}
            ${hasFields ? `
            <table class="infobox-table">
                ${fields.map(f => `<tr><td>${f.label}</td><td>${f.value}</td></tr>`).join('')}
            </table>` : ''}
        </div>
    `
}

function renderContent(content, imageUrl) {
    if (!content) return ''
    let html = content
        .replace(/^> (.+)$/gm, '
